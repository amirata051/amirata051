<text x="569.7" y="73.0" class="c"><tspan class="user">❯ </tspan><tspan class="code">cat </tspan><tspan class="code">me.py</tspan></text>
<text x="569.7" y="107.0" class="c"><tspan class="kw">from</tspan><tspan class="code"> future </tspan><tspan class="kw">import</tspan><tspan class="code"> Research</tspan></text>
<text x="569.7" y="124.0" class="c"><tspan class="kw">import</tspan><tspan class="code"> torch</tspan></text>
<text x="569.7" y="141.0" class="c"><tspan class="kw">import</tspan><tspan class="code"> torch.nn </tspan><tspan class="kw">as</tspan><tspan class="code"> nn</tspan></text>
<text x="569.7" y="175.0" class="c"><tspan class="kw">class</tspan><tspan class="code"> </tspan><tspan class="ent">AmirAta</tspan><tspan class="code">(nn.Module):</tspan></text>
<text x="569.7" y="192.0" class="c"><tspan class="code">    </tspan><tspan class="str">"""AI / ML Researcher"""</tspan></text>
<text x="569.7" y="226.0" class="c"><tspan class="code">    </tspan><tspan class="kw">def</tspan><tspan class="code"> </tspan><tspan class="ent">__init__</tspan><tspan class="code">(</tspan><tspan class="num">self</tspan><tspan class="code">):</tspan></text>
<text x="569.7" y="243.0" class="c"><tspan class="code">        </tspan><tspan class="num">super</tspan><tspan class="code">().__init__()</tspan></text>
<text x="569.7" y="260.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.role      = </tspan><tspan class="str">"Research Intern @ OIST, Japan 🇯🇵"</tspan></text>
<text x="569.7" y="277.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.focus     = </tspan><tspan class="str">"self-supervised learning for genomics (VICReg · JEPA · GNNs)"</tspan></text>
<text x="569.7" y="294.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.education = </tspan><tspan class="str">"B.Sc. Computer Science, Amirkabir — GPA 4.0/4.0"</tspan></text>
<text x="569.7" y="311.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.status    = </tspan><tspan class="str">"applying for PhD positions · starting 2027"</tspan></text>
<text x="569.7" y="328.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.interests = [</tspan></text>
<text x="569.7" y="345.0" class="c"><tspan class="code">            </tspan><tspan class="str">"World Models"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="362.0" class="c"><tspan class="code">            </tspan><tspan class="str">"RL"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="379.0" class="c"><tspan class="code">            </tspan><tspan class="str">"Robotics"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="396.0" class="c"><tspan class="code">            </tspan><tspan class="str">"Embodied AI"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="413.0" class="c"><tspan class="code">            </tspan><tspan class="str">"Neuroscience"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="430.0" class="c"><tspan class="code">            </tspan><tspan class="str">"Comp. Biology"</tspan><tspan class="code">,</tspan></text>
<text x="569.7" y="447.0" class="c"><tspan class="code">        ]</tspan></text>
<text x="569.7" y="464.0" class="c"><tspan class="code">        </tspan><tspan class="num">self</tspan><tspan class="code">.epsilon   = </tspan><tspan class="num">0.3</tspan><tspan class="code">  </tspan><tspan class="com"># still in the exploration phase</tspan></text>
<text x="569.7" y="498.0" class="c"><tspan class="code">    </tspan><tspan class="kw">def</tspan><tspan class="code"> </tspan><tspan class="ent">forward</tspan><tspan class="code">(</tspan><tspan class="num">self</tspan><tspan class="code">, obs: Tensor) -&gt; Action:</tspan></text>
<text x="569.7" y="515.0" class="c"><tspan class="code">        z = </tspan><tspan class="num">self</tspan><tspan class="code">.world_model(obs)   </tspan><tspan class="com"># compress reality into a latent space</tspan></text>
<text x="569.7" y="532.0" class="c"><tspan class="code">        </tspan><tspan class="kw">return</tspan><tspan class="code"> </tspan><tspan class="num">self</tspan><tspan class="code">.policy(z)       </tspan><tspan class="com"># ...then act on it</tspan></text>
<text x="569.7" y="566.0" class="c"><tspan class="code">    </tspan><tspan class="kw">def</tspan><tspan class="code"> </tspan><tspan class="ent">loss</tspan><tspan class="code">(</tspan><tspan class="num">self</tspan><tspan class="code">) -&gt; Tensor:</tspan></text>
<text x="569.7" y="583.0" class="c"><tspan class="code">        </tspan><tspan class="kw">return</tspan><tspan class="code"> (</tspan></text>
<text x="569.7" y="600.0" class="c"><tspan class="code">              curiosity(weight=</tspan><tspan class="num">1.0</tspan><tspan class="code">)</tspan></text>
<text x="569.7" y="617.0" class="c"><tspan class="code">            + depth(weight=</tspan><tspan class="num">0.8</tspan><tspan class="code">)</tspan></text>
<text x="569.7" y="634.0" class="c"><tspan class="code">            - stagnation(weight=</tspan><tspan class="num">float</tspan><tspan class="code">(</tspan><tspan class="str">"inf"</tspan><tspan class="code">))</tspan></text>
<text x="569.7" y="651.0" class="c"><tspan class="code">        )</tspan></text>
